<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Honzima | Creative Digital Studio</title>
  <meta name="description" content="Honzima is a creative digital studio specializing in web design, UI/UX, branding, and digital experiences that help businesses grow online." />
  <meta name="keywords" content="Honzima, creative studio, web design, UI UX design, branding, digital agency, portfolio" />
  <meta name="author" content="Honzima" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://honzima.vercel.app/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/site-logo.png" />
  <link rel="apple-touch-icon" href="/site-logo.png" />

  <!-- Theme -->
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Open Graph (Facebook / LinkedIn / Google) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Honzima" />
  <meta property="og:title" content="Honzima | Creative Digital Studio" />
  <meta property="og:description" content="Honzima is a creative digital studio specializing in web design, UI/UX, branding, and digital experiences that help businesses grow online." />
  <meta property="og:url" content="https://honzima.vercel.app/" />
  <meta property="og:image" content="https://honzima.vercel.app/mockup.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Honzima | Creative Digital Studio" />
  <meta name="twitter:description" content="Honzima is a creative digital studio specializing in web design, UI/UX, branding, and digital experiences that help businesses grow online." />
  <meta name="twitter:image" content="https://honzima.vercel.app/mockup.png" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Honzima",
    "alternateName": "Honzima Creative Digital Studio",
    "url": "https://honzima.vercel.app/",
    "description": "Honzima is a creative digital studio specializing in web design, UI/UX, branding, and digital experiences.",
    "publisher": {
      "@type": "Organization",
      "name": "Honzima",
      "url": "https://honzima.vercel.app/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://honzima.vercel.app/site-logo.png"
      }
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://honzima.vercel.app/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
